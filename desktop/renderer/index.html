<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code GUI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-orange: #d29922;
  --border: #30363d;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-app-region: drag;
}

/* ---- Top bar ---- */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
  flex-shrink: 0;
}

.topbar > * { -webkit-app-region: no-drag; }

.logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent-blue);
  white-space: nowrap;
}

.folder-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.folder-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }

.mode-select {
  padding: 5px 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  margin-left: auto;
}
.mode-select:focus { outline: none; border-color: var(--accent-blue); }

.status {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-green);
}
.status-dot.busy { background: var(--accent-orange); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ---- Messages ---- */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg.user {
  align-self: flex-end;
  background: #1f3a5f;
  border: 1px solid #264a78;
  color: var(--text-primary);
}

.msg.assistant {
  align-self: flex-start;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
}

.msg.error {
  align-self: flex-start;
  background: #3d1f1f;
  border: 1px solid #6e3030;
  color: #f88;
  font-size: 13px;
}

.msg.system {
  align-self: center;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 4px 12px;
}

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-secondary);
  gap: 8px;
}
.welcome h2 { color: var(--text-primary); font-size: 20px; font-weight: 600; }
.welcome p { font-size: 14px; }

/* ---- Code blocks ---- */
.msg pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin: 8px 0;
  overflow-x: auto;
  font-size: 13px;
}
.msg code {
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 13px;
}
.msg :not(pre) > code {
  background: var(--bg-tertiary);
  padding: 2px 5px;
  border-radius: 3px;
}

/* ---- Input ---- */
.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
}

.input-area textarea {
  flex: 1;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 14px;
  resize: none;
  min-height: 42px;
  max-height: 200px;
  line-height: 1.5;
}
.input-area textarea:focus { outline: none; border-color: var(--accent-blue); }
.input-area textarea::placeholder { color: var(--text-secondary); }

.send-btn, .stop-btn {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.send-btn {
  background: var(--accent-blue);
  color: #fff;
}
.send-btn:hover { background: #4c9aed; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.stop-btn {
  background: #da3633;
  color: #fff;
  display: none;
}
.stop-btn:hover { background: #c62828; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="logo">Claude Code</span>
  <button class="folder-btn" id="folderBtn" title="Select project folder">
    <span>&#128193;</span>
    <span id="folderLabel">Select folder...</span>
  </button>
  <select class="mode-select" id="modeSelect" title="Permission mode">
    <option value="default">Ask</option>
    <option value="acceptEdits">Code</option>
    <option value="plan">Plan</option>
    <option value="dangerously-skip-permissions">Act (full access)</option>
  </select>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Ready</span>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>Claude Code GUI</h2>
    <p>Select a project folder and start chatting.</p>
    <p style="font-size:12px;color:var(--text-secondary)">Powered by Claude Code CLI</p>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <textarea id="input" rows="1" placeholder="Ask Claude anything..." autofocus></textarea>
  <button class="send-btn" id="sendBtn">Send</button>
  <button class="stop-btn" id="stopBtn">Stop</button>
</div>

<script>
const messagesEl = document.getElementById("messages");
const welcomeEl = document.getElementById("welcome");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const stopBtn = document.getElementById("stopBtn");
const folderBtn = document.getElementById("folderBtn");
const folderLabel = document.getElementById("folderLabel");
const modeSelect = document.getElementById("modeSelect");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

let projectFolder = null;
let busy = false;
let currentAssistantEl = null;

// ---- Folder selection ----
folderBtn.addEventListener("click", async () => {
  const folder = await window.claude.selectFolder();
  if (folder) {
    projectFolder = folder;
    const short = folder.split(/[\\/]/).pop();
    folderLabel.textContent = short;
    folderBtn.title = folder;
  }
});

// ---- Auto-resize textarea ----
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
});

// ---- Send message ----
async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  if (welcomeEl) welcomeEl.remove();

  addMessage("user", text);
  inputEl.value = "";
  inputEl.style.height = "auto";

  setBusy(true);

  // Create streaming assistant bubble
  currentAssistantEl = addMessage("assistant", "");

  const { result, error, code } = await window.claude.sendMessage({
    message: text,
    cwd: projectFolder,
    permissionMode: modeSelect.value,
  });

  // If streaming didn't fill it, set final result
  if (currentAssistantEl && !currentAssistantEl.textContent.trim()) {
    currentAssistantEl.textContent = result || "(no response)";
  }

  if (error) {
    addMessage("error", error);
  }

  currentAssistantEl = null;
  setBusy(false);
}

// ---- Stream chunks ----
window.claude.onChunk((chunk) => {
  if (currentAssistantEl) {
    // Try to parse streaming JSON lines
    const lines = chunk.split("\n").filter(Boolean);
    for (const line of lines) {
      try {
        const obj = JSON.parse(line);
        if (obj.type === "assistant" && obj.message?.content) {
          for (const block of obj.message.content) {
            if (block.type === "text") {
              currentAssistantEl.textContent += block.text;
            }
          }
        } else if (obj.type === "result" && obj.result) {
          currentAssistantEl.textContent = obj.result;
        }
      } catch {
        // Plain text chunk
        currentAssistantEl.textContent += chunk;
        break;
      }
    }
    scrollToBottom();
  }
});

// ---- Stop ----
stopBtn.addEventListener("click", async () => {
  await window.claude.stopClaude();
  if (currentAssistantEl && !currentAssistantEl.textContent.trim()) {
    currentAssistantEl.textContent = "(stopped)";
  }
  currentAssistantEl = null;
  setBusy(false);
});

// ---- Keyboard ----
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener("click", send);

// ---- Helpers ----
function addMessage(role, text) {
  const el = document.createElement("div");
  el.className = `msg ${role}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setBusy(b) {
  busy = b;
  sendBtn.disabled = b;
  sendBtn.style.display = b ? "none" : "block";
  stopBtn.style.display = b ? "block" : "none";
  statusDot.className = b ? "status-dot busy" : "status-dot";
  statusText.textContent = b ? "Thinking..." : "Ready";
}
</script>

</body>
</html>
